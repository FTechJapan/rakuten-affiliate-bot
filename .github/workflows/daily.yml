name: 楽天アフィリエイト 日次投稿
on:
  push:
    paths:
      - "products.json"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run（投稿しない）"
        type: boolean
        default: false
      threads_only:
        description: "Threadsのみ投稿"
        type: boolean
        default: false
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 日本語フォントをインストール
        run: sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: 依存関係をインストール
        run: pip install -r requirements.txt

      - name: 出力ディレクトリを作成
        run: mkdir -p output/images

      - name: 投稿を実行
        env:
          RAKUTEN_APP_ID:         ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:     ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID:   ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN:   ${{ secrets.THREADS_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          THREADS_USER_ID:        ${{ secrets.THREADS_USER_ID }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:          ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:          ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:          ${{ secrets.R2_PUBLIC_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.threads_only }}" = "true" ]; then ARGS="$ARGS --threads-only"; fi
          python main.py $ARGS

      - name: posted_items.jsonをGitHubにpush
        if: always()
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git stash || true
            git pull --rebase origin main
            git stash pop || true
            git add posted_items.json
            git diff --cached --quiet || git commit -m "update posted items [skip ci]"
            git push

      - name: ログをArtifactとして保存（30日間）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_id }}
          path: output/log.jsonl
          retention-days: 30